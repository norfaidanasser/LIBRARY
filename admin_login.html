<!-- ================= ADMIN LOGIN ================= -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login | NEU Library</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin_login.css">
</head>
<body>

<header class="header">
    <h1>NEU Library System</h1>
    <p>Hello Admin!</p>
</header>

<div class="main">
<div class="loginCard">
<h2>Admin Login</h2>

<div class="field">
<label>Admin Email</label>
<input type="email" id="email" placeholder="Enter admin email">
</div>

<div class="field">
<label>Password</label>
<input type="password" id="password" placeholder="Enter password">
</div>

<button class="loginBtn" onclick="adminLogin()">Login</button>
<button class="backBtn" onclick="goBack()">Back to Main Login</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAx38EXoudizcyiHRsIz7oLR3VmRboo9Dk",
  authDomain: "neulibrary-2845c.firebaseapp.com",
  projectId: "neulibrary-2845c",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.adminLogin = function(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
    .then(() => {
        alert("Login successful!");
        window.location.href = "admin_dashboard.html";
    })
    .catch((error) => {
        alert("Login failed: " + error.message);
    });
}

window.goBack = function(){
    window.location.href="index.html";
}
</script>

</body>
</html>
