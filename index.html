<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEU Library Login / Register</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.adminLoginWrapper {
    text-align: center;
    margin-bottom: 15px;
}
.adminLoginBtn {
    background-color: #2c3e50;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.3s;
}
.adminLoginBtn:hover {
    background-color: #34495e;
}
</style>
</head>
<body>
<header class="header">
    <h1>NEU Library System</h1>
    <p>Welcome! Please login or register to continue</p>
</header>

<div class="main">
    <div class="loginCard">

 <div class="adminLoginWrapper" style="text-align:center; margin-bottom:15px;">
    <button class="tabBtn" 
            style="background-color:#2c3e50; color:white; padding:10px 20px; border-radius:5px; border:none; cursor:pointer; font-weight:500;"
            onclick="window.location.href='admin_login.html'">
        Admin Login
    </button>
</div>
        <div class="tabs">
            <button class="tabBtn active" onclick="showTab('login')">Login</button>
            <button class="tabBtn" onclick="showTab('register')">Register</button>
        </div>
        <div id="login" class="tabContent">
            <h2>Login</h2>

            <div class="field">
                <label>User Role</label>
                <select id="loginRole">
                    <option value="">Select Role</option>
                    <option value="visitor">Visitor</option>
                    <option value="student">Student</option>
                    <option value="faculty">Faculty</option>
                </select>
            </div>

            <div class="field">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="Enter your email">
            </div>

            <div class="field">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>

            <div class="field">
                <label>Purpose</label>
                <input type="text" id="loginPurpose" placeholder="Enter purpose of visit">
            </div>

            <button class="loginBtn" onclick="loginUser()">Login</button>
        </div>
        <div id="register" class="tabContent" style="display:none;">
            <h2>Register</h2>

            <div class="field">
                <label>Name</label>
                <input type="text" id="regName" placeholder="Enter your full name">
            </div>

            <div class="field">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="Enter your NEU email">
            </div>

            <div class="field">
                <label>Register As</label>
                <select id="regRole" onchange="showFacultyDepartment()">
                    <option value="">Select Role</option>
                    <option value="student">Student</option>
                    <option value="faculty">Faculty</option>
                    <option value="visitor">Visitor</option>
                </select>
            </div>

            <div id="programGroup" class="field">
                <label>Program / College</label>
                <select id="regProgram">
                    <option value="">Select Program</option>
                    <option>College of Accountancy</option>
                    <option>College of Arts and Science</option>
                    <option>College of Business Administration</option>
                    <option>Integrated School</option>
                </select>
            </div>

            <div id="facultyDepartmentGroup" style="display:none; margin-top:10px;">
                <label>Faculty Department</label>
                <select id="regProgramFaculty">
                    <option value="" disabled selected>Select your department...</option>
                    <option>College of Accountancy Faculty</option>
                    <option>College of Arts and Science Faculty</option>
                    <option>College of Business Administration Faculty</option>
                </select>
            </div>

            <div class="field">
                <label>Create Password</label>
                <input type="password" id="regPassword" placeholder="Enter password">
            </div>

            <button class="loginBtn" onclick="registerUser()">Register</button>
        </div>

    </div>
</div>

<script type="module" src="visitor.js"></script>
<script>
function showTab(tabName){
    document.getElementById('login').style.display = tabName === 'login' ? 'block' : 'none';
    document.getElementById('register').style.display = tabName === 'register' ? 'block' : 'none';
    const tabs = document.querySelectorAll('.tabBtn');
    tabs.forEach(t => t.classList.remove('active'));
    if(tabName === 'login') tabs[0].classList.add('active');
    else tabs[1].classList.add('active');
}

function showFacultyDepartment(){
    const role = document.getElementById('regRole').value;
    document.getElementById('facultyDepartmentGroup').style.display = role === 'faculty' ? 'block' : 'none';
}
</script>

</body>
</html>
